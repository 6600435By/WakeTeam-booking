name: Restore backup

on:
  workflow_dispatch:
    inputs:
      backup_id:
        description: Backup manifest id (database)
        required: true
      files_backup_id:
        description: Backup manifest id for files (if different from backup_id)
        required: false
        default: ""
      restore_db:
        description: Restore database
        required: true
        default: "true"
      restore_files:
        description: Restore files
        required: true
        default: "false"
      confirm_token:
        description: HMAC confirm token
        required: true
      restore_id:
        description: Restore tracking id
        required: true
      requested_by:
        description: Actor name
        required: false
        default: ""

jobs:
  restore:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      BACKUP_RESTORE_SECRET: ${{ secrets.BACKUP_RESTORE_SECRET }}
      GITHUB_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install PostgreSQL client 18
        run: |
          sudo install -d /usr/share/postgresql-common/pgdg
          sudo curl -o /usr/share/postgresql-common/pgdg/apt.postgresql.org.asc --fail https://www.postgresql.org/media/keys/ACCC4CF8.asc
          sudo sh -c 'echo "deb [signed-by=/usr/share/postgresql-common/pgdg/apt.postgresql.org.asc] https://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" > /etc/apt/sources.list.d/pgdg.list'
          sudo apt-get update
          sudo apt-get install -y postgresql-client-18 zip unzip
          echo "/usr/lib/postgresql/18/bin" >> "$GITHUB_PATH"

      - name: Run restore
        run: >
          npx tsx scripts/backup-cli.ts restore
          --backup-id=${{ github.event.inputs.backup_id }}
          --files-backup-id=${{ github.event.inputs.files_backup_id || github.event.inputs.backup_id }}
          --restore-id=${{ github.event.inputs.restore_id }}
          --confirm-token=${{ github.event.inputs.confirm_token }}
          --restore-db=${{ github.event.inputs.restore_db }}
          --restore-files=${{ github.event.inputs.restore_files }}
          --requested-by=${{ github.event.inputs.requested_by }}
