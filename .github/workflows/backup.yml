name: Backup

on:
  schedule:
    - cron: "0 3 * * *"
    - cron: "0 4 * * *"
    - cron: "0 4 1 11,12,1,2,3,4 *"
  workflow_dispatch:
    inputs:
      part:
        description: "db | files | all | trim"
        required: true
        default: "all"
      force:
        description: "Force backup even if unchanged"
        required: false
        default: "false"

jobs:
  backup:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      BACKUP_RESTORE_SECRET: ${{ secrets.BACKUP_RESTORE_SECRET }}
      BACKUP_SEASON_START_MONTH: ${{ vars.BACKUP_SEASON_START_MONTH || '5' }}
      BACKUP_SEASON_END_MONTH: ${{ vars.BACKUP_SEASON_END_MONTH || '10' }}
      BACKUP_SEASON_DB_RETENTION_COUNT: ${{ vars.BACKUP_SEASON_DB_RETENTION_COUNT || '5' }}
      BACKUP_SEASON_FILES_RETENTION_COUNT: ${{ vars.BACKUP_SEASON_FILES_RETENTION_COUNT || '2' }}
      BACKUP_OFFSEASON_RETENTION_COUNT: ${{ vars.BACKUP_OFFSEASON_RETENTION_COUNT || '1' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install PostgreSQL client 18
        run: |
          sudo install -d /usr/share/postgresql-common/pgdg
          sudo curl -o /usr/share/postgresql-common/pgdg/apt.postgresql.org.asc --fail https://www.postgresql.org/media/keys/ACCC4CF8.asc
          sudo sh -c 'echo "deb [signed-by=/usr/share/postgresql-common/pgdg/apt.postgresql.org.asc] https://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" > /etc/apt/sources.list.d/pgdg.list'
          sudo apt-get update
          sudo apt-get install -y postgresql-client-18 zip unzip
          echo "/usr/lib/postgresql/18/bin" >> "$GITHUB_PATH"

      # Mode must come from github.event.schedule (the cron expression), not wall-clock
      # hour — GitHub often starts scheduled jobs hours late, which used to skip all backups.
      - name: Decide job mode
        id: mode
        env:
          SCHEDULE: ${{ github.event.schedule }}
        run: |
          PART="${{ github.event.inputs.part }}"
          if [ "${{ github.event_name }}" = "schedule" ]; then
            MONTH=$(date -u +%-m)
            IN_SEASON=1
            if [ "$MONTH" -ge 11 ] || [ "$MONTH" -le 4 ]; then
              IN_SEASON=0
            fi

            if [ "$SCHEDULE" = "0 4 1 11,12,1,2,3,4 *" ]; then
              echo "mode=trim-offseason" >> "$GITHUB_OUTPUT"
            elif [ "$IN_SEASON" = "0" ]; then
              echo "mode=skip" >> "$GITHUB_OUTPUT"
            elif [ "$SCHEDULE" = "0 3 * * *" ]; then
              echo "mode=db" >> "$GITHUB_OUTPUT"
            elif [ "$SCHEDULE" = "0 4 * * *" ]; then
              echo "mode=files" >> "$GITHUB_OUTPUT"
            else
              echo "Unknown schedule cron: $SCHEDULE" >&2
              echo "mode=skip" >> "$GITHUB_OUTPUT"
            fi
          elif [ -n "$PART" ]; then
            echo "mode=$PART" >> "$GITHUB_OUTPUT"
          else
            echo "mode=all" >> "$GITHUB_OUTPUT"
          fi
          echo "force=${{ github.event.inputs.force || 'false' }}" >> "$GITHUB_OUTPUT"

      - name: Skip scheduled run
        if: steps.mode.outputs.mode == 'skip'
        run: echo "Scheduled slot skipped (off-season or unknown cron)."

      - name: Backup database
        if: steps.mode.outputs.mode == 'db' || steps.mode.outputs.mode == 'all'
        run: |
          ARGS="backup-db"
          if [ "${{ steps.mode.outputs.force }}" = "true" ]; then ARGS="$ARGS --force"; fi
          npx tsx scripts/backup-cli.ts $ARGS

      - name: Backup files
        if: steps.mode.outputs.mode == 'files' || steps.mode.outputs.mode == 'all'
        run: |
          ARGS="backup-files"
          if [ "${{ steps.mode.outputs.force }}" = "true" ]; then ARGS="$ARGS --force"; fi
          npx tsx scripts/backup-cli.ts $ARGS

      - name: Trim backups
        if: steps.mode.outputs.mode == 'trim' || steps.mode.outputs.mode == 'trim-offseason'
        run: |
          ARGS="trim"
          if [ "${{ steps.mode.outputs.mode }}" = "trim-offseason" ]; then ARGS="$ARGS --offseason"; fi
          npx tsx scripts/backup-cli.ts $ARGS
